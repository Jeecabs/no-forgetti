name: Bug report
description: Report reproducible No Forgetti behavior
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: Include Pi, Node.js, and No Forgetti versions. Remove secrets and session content.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove credentials, private prompts, and project-memory contents.
      render: shell
